<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>COLAPIS logo check</title>
  <style>
    body { margin: 0; background: #f6f0e7; color: #12100d; font-family: Avenir Next, Helvetica, Arial, sans-serif; }
    main { max-width: 1120px; margin: 0 auto; padding: 56px 28px 72px; }
    h1 { font-family: Georgia, serif; font-size: 42px; font-weight: 500; margin: 0 0 24px; letter-spacing: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; }
    .card { border: 1px solid color-mix(in srgb, #12100d 18%, transparent); background: rgba(255,255,255,.28); padding: 18px; min-height: 230px; display: grid; align-content: center; gap: 12px; }
    .label { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #6e746d; }
    img { width: 100%; max-height: 360px; object-fit: contain; display: block; }
  </style>
</head>
<body>
  <main>
    <h1>COLAPIS</h1>
    <div class="grid">
      <section class="card"><div class="label">mark</div><img src="./colapis-mark.svg" alt="mark"></section>
<section class="card"><div class="label">wordmark</div><img src="./colapis-wordmark.svg" alt="wordmark"></section>
<section class="card"><div class="label">horizontal lockup</div><img src="./colapis-lockup-horizontal.svg" alt="horizontal lockup"></section>
<section class="card"><div class="label">stacked lockup</div><img src="./colapis-lockup-stacked.svg" alt="stacked lockup"></section>
<section class="card"><div class="label">mono black</div><img src="./colapis-mono-black.svg" alt="mono black"></section>
<section class="card"><div class="label">mono white</div><img src="./colapis-mono-white.svg" alt="mono white"></section>
<section class="card"><div class="label">social avatar</div><img src="./colapis-social-avatar.svg" alt="social avatar"></section>
    </div>
  </main>
</body>
</html>
